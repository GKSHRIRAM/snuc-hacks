<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Intelligence Collector</title>
    <style>
        :root {
            --bg-color: #f9fafb;
            --surface-color: #ffffff;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --border-color: #d1d5db;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --danger-color: #ef4444;
            --danger-hover: #b91c1c;
            --disabled-bg: #e5e7eb;
            --disabled-text: #9ca3af;
            --chip-bg: #e0e7ff;
            --chip-text: #3730a3;
            --log-bg: #1f2937;
            --log-text: #10b981;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;
                --surface-color: #1f2937;
                --text-primary: #f9fafb;
                --text-secondary: #9ca3af;
                --border-color: #374151;
                --primary-color: #3b82f6;
                --primary-hover: #2563eb;
                --disabled-bg: #374151;
                --disabled-text: #6b7280;
                --chip-bg: #3730a3;
                --chip-text: #e0e7ff;
                --log-bg: #000000;
                --log-text: #10b981;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .container {
            background-color: var(--surface-color);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .input-row {
            display: flex;
            gap: 0.5rem;
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }

        button.primary {
            background-color: var(--primary-color);
            color: white;
        }

        button.primary:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        button.secondary {
            background-color: var(--bg-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        button.secondary:hover:not(:disabled) {
            background-color: var(--border-color);
        }

        button:disabled {
            background-color: var(--disabled-bg);
            color: var(--disabled-text);
            cursor: not-allowed;
            border-color: transparent;
        }

        .helper-text {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
        
        .error-text {
            color: var(--danger-color);
        }

        .chip-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            background-color: var(--chip-bg);
            color: var(--chip-text);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .chip button {
            background: none;
            border: none;
            color: var(--chip-text);
            padding: 0;
            margin-left: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.25rem;
            height: 1.25rem;
            border-radius: 50%;
        }

        .chip button:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }

        .run-container {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .run-button {
            width: 100%;
            padding: 1rem;
            font-size: 1.125rem;
        }

        .log-panel {
            margin-top: 1.5rem;
            background-color: var(--log-bg);
            color: var(--log-text);
            padding: 1rem;
            border-radius: 6px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.875rem;
            height: 200px;
            overflow-y: auto;
            display: none;
        }

        .log-panel.active {
            display: block;
        }

        .log-entry {
            margin-bottom: 0.25rem;
        }

        .downloads {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            display: none;
        }

        .downloads.active {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Intelligence Collector</h1>
        
        <div class="form-group">
            <label for="domain">Enter your domain / industry (e.g. 'EV charging', 'cloud storage')</label>
            <input type="text" id="domain" placeholder="Domain or industry...">
        </div>

        <div class="form-group">
            <label>Companies to track <span class="helper-text" id="company-count">(3/10)</span></label>
            <div class="input-row">
                <input type="text" id="company-input" placeholder="Add a company...">
                <button type="button" class="secondary" id="add-company-btn">Add</button>
            </div>
            <div class="helper-text error-text" id="company-error" style="display: none;">Maximum 10 companies allowed.</div>
            <div class="chip-container" id="chip-container">
                <!-- Chips rendered by JS -->
            </div>
        </div>

        <div class="run-container">
            <button class="primary run-button" id="run-btn" disabled>Run Collection</button>
        </div>

        <div class="log-panel" id="log-panel"></div>

        <div class="downloads" id="downloads">
            <h3>Download Results</h3>
            <div class="button-group">
                <button class="secondary" onclick="window.open('/api/download/reviews', '_blank')">reviews.json</button>
                <button class="secondary" onclick="window.open('/api/download/snapshots', '_blank')">snapshots.json</button>
                <button class="secondary" onclick="window.open('/api/download/news', '_blank')">news.json</button>
            </div>
        </div>
    </div>

    <script>
        const MAX_COMPANIES = 10;
        let companies = ["Tesla", "ChargePoint", "EVgo"];
        
        const domainInput = document.getElementById('domain');
        const companyInput = document.getElementById('company-input');
        const addCompanyBtn = document.getElementById('add-company-btn');
        const chipContainer = document.getElementById('chip-container');
        const companyCount = document.getElementById('company-count');
        const companyError = document.getElementById('company-error');
        const runBtn = document.getElementById('run-btn');
        const logPanel = document.getElementById('log-panel');
        const downloads = document.getElementById('downloads');

        function renderChips() {
            chipContainer.innerHTML = '';
            companies.forEach((company, index) => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.innerHTML = `
                    ${company}
                    <button onclick="removeCompany(${index})" title="Remove">×</button>
                `;
                chipContainer.appendChild(chip);
            });
            
            companyCount.textContent = `(${companies.length}/${MAX_COMPANIES})`;
            
            if (companies.length >= MAX_COMPANIES) {
                companyInput.disabled = true;
                addCompanyBtn.disabled = true;
                companyError.style.display = 'block';
            } else {
                companyInput.disabled = false;
                addCompanyBtn.disabled = false;
                companyError.style.display = 'none';
            }
            
            checkRunState();
        }

        function addCompany() {
            const val = companyInput.value.trim();
            if (val && companies.length < MAX_COMPANIES && !companies.includes(val)) {
                companies.push(val);
                companyInput.value = '';
                renderChips();
            }
        }

        function removeCompany(index) {
            companies.splice(index, 1);
            renderChips();
        }

        function checkRunState() {
            const hasDomain = domainInput.value.trim().length > 0;
            const hasCompanies = companies.length > 0;
            runBtn.disabled = !(hasDomain && hasCompanies);
        }

        function appendLog(message) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `> ${message}`;
            logPanel.appendChild(entry);
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        addCompanyBtn.addEventListener('click', addCompany);
        companyInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addCompany();
            }
        });
        
        domainInput.addEventListener('input', checkRunState);

        runBtn.addEventListener('click', async () => {
            runBtn.disabled = true;
            logPanel.innerHTML = '';
            logPanel.classList.add('active');
            downloads.classList.remove('active');
            
            appendLog('Starting collection pipeline...');

            try {
                const response = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        domain: domainInput.value.trim(),
                        companies: companies
                    })
                });

                if (!response.ok) throw new Error('Failed to start collection');
                appendLog('Pipeline triggered successfully.');

                // Start SSE listener
                const eventSource = new EventSource('/api/stream');
                
                eventSource.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    appendLog(data.message);
                    
                    if (data.status === 'complete' || data.status === 'error') {
                        eventSource.close();
                        runBtn.disabled = false;
                        if (data.status === 'complete') {
                            downloads.classList.add('active');
                        }
                    }
                };

                eventSource.onerror = () => {
                    appendLog('Error: Connection to log stream lost.');
                    eventSource.close();
                    runBtn.disabled = false;
                };

            } catch (err) {
                appendLog(`Error: ${err.message}`);
                runBtn.disabled = false;
            }
        });

        // Initial render
        renderChips();
    </script>
</body>
</html>
